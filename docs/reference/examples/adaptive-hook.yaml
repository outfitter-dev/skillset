claude:
  if: Bash(git *)
codex:
  matcher: Bash
context:
  env:
    - provider
    - hook.event
    - session.id
  strategy: toolkit
description: Checks shell commands before they run.
events:
  - PreToolUse
match:
  tool:
    - Bash
name: shell-policy
providers:
  - claude
  - codex
run:
  args:
    - --event
    - pre-tool-use
  command: node ./hooks/shell-policy/check.js
  cwd: .
  env:
    SKILLSET_HOOK: shell-policy
  script: ./check.js
status: Checking shell policy
