# yaml-language-server: $schema=https://raw.githubusercontent.com/outfitter-dev/skillset/main/docs/reference/schemas/0.1.0/workspace-config.schema.json
agents:
  defaults:
    skillsPrompt: "Load the following skills first, if available:"
changes:
  minimumRefLength: 6
claude: true
codex:
  plugins:
    path: plugins-codex
compile:
  build: updated
  features:
    promptArguments: true
  skillset:
    metadata: true
  targets:
    - claude
    - codex
  unsupportedDestination: error
defaults:
  codex:
    agents:
      model: gpt-5.1-codex
dependencies:
  plugins:
    - acme-tools
    - marketplace: acme
      name: docs
      plugin: docs
      range: ^2.4.0
      unversioned: false
distributions:
  plugins:
    path: dist/plugins
skillset:
  author:
    email: team@example.com
    name: Example Team
  category: Developer Tools
  description: Source-first agent loadout for the example team.
  homepage: https://example.com/skillset
  keywords:
    - agents
    - docs
  license: MIT
  name: example-team
  owner:
    name: Example Team
  preprocess: true
  presentation:
    capabilities:
      - Read
      - Write
    displayName: Example Team
  repository: https://github.com/example/team-skillset
  schema: 1
  strict: true
  summary: Example team Skillset source.
  title: Example Team Skillset
  version: 0.1.0
supports:
  packages:
    - "@acme/docs-cli >=2.4.0 <3.0.0"
    - name: "@acme/api"
      onMismatch: warn
      range: ^1.0.0
      source: repo:package.json
