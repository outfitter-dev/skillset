# NOTE: `GIT_PAGER: cat` is set on every leaf job. Lefthook attaches a PTY to
# render hook output, which can make child `git` processes think stdout is an
# interactive terminal. Contributors with a configured pager can then hang when
# a stage invokes `git diff` / `git grep` / etc. Forcing `GIT_PAGER=cat` keeps
# hook-time git commands non-interactive. Hook-level `env` does not propagate
# to job children, so it must be set per-job.

pre-commit:
  piped: true
  jobs:
    - name: repo-sanity
      env:
        GIT_PAGER: cat
      run: |
        test "$(git config --default false core.bare)" = "false" || { echo "core.bare is true — a concurrent tool corrupted .git/config and checkouts will fail; repair with 'git config core.bare false'"; exit 1; }
    - name: whitespace
      env:
        GIT_PAGER: cat
      run: git diff --cached --check
    - name: skillset
      env:
        GIT_PAGER: cat
      glob: "{.skillset/**,.claude/skills/**,.agents/skills/**,plugins/**,AGENTS.md}"
      run: bun run skillset:check:outputs
    - name: workflows
      env:
        GIT_PAGER: cat
      glob: ".github/workflows/*.{yml,yaml}"
      run: bun run check:workflows

# Cheap gates run first and fail fast (piped); the two heavy gates are
# independent, so they run in parallel. `bun run check` is the same aggregate
# CI runs, and `skillset check --ci` already covers source diagnostics + generated drift,
# so neither is re-enumerated here.
pre-push:
  piped: true
  jobs:
    - name: repo-sanity
      env:
        GIT_PAGER: cat
      run: |
        test "$(git config --default false core.bare)" = "false" || { echo "core.bare is true — a concurrent tool corrupted .git/config and checkouts will fail; repair with 'git config core.bare false'"; exit 1; }
    - name: whitespace
      env:
        GIT_PAGER: cat
      run: git diff --check "$(scripts/git-trunk.sh)...HEAD"
    - name: changesets
      env:
        GIT_PAGER: cat
      run: bun run changeset:check
    - name: workflows
      env:
        GIT_PAGER: cat
      run: bun run check:workflows
    - name: gates
      group:
        parallel: true
        jobs:
          - name: check
            env:
              GIT_PAGER: cat
            run: bun run check
          - name: skillset-ci
            env:
              GIT_PAGER: cat
            run: bun run skillset:check:ci:report
