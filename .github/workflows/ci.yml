# Repo CI plus a dogfood of the `skillset ci` workflow that
# `skillset init --include ci` scaffolds for adopting repos. The skillset-ci job
# mirrors that template but runs the compiler from this repo's source.
# Notes:
# - Mechanical fixes pushed with GITHUB_TOKEN do not retrigger workflows; if
#   branch protection requires checks on the fixed commit, push with a PAT instead.
# - The comment step prefers gh >= 2.68 (--create-if-none) and falls back to a new comment.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changeset:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - name: Read pull request file list
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: >-
          gh api --paginate
          "repos/$GH_REPO/pulls/$PR_NUMBER/files?per_page=100"
          --jq '.[] | "\(.status)\t\(.filename)"'
          > "$RUNNER_TEMP/changed-files.txt"
      - run: bun run changeset:check -- --changed-files "$RUNNER_TEMP/changed-files.txt"

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run check

  skillset-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout same-repo pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Checkout fork pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Checkout push
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - name: Detect stack boundary
        id: stack
        if: github.event_name == 'pull_request'
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          child_count="$(gh pr list --repo "$GH_REPO" --state open --base "$HEAD_REF" --json number --jq 'length')"
          echo "child_count=$child_count" >> "$GITHUB_OUTPUT"

          if [ "$child_count" != "0" ]; then
            echo "skip_skillset_ci=true" >> "$GITHUB_OUTPUT"
            echo "Skipping skillset ci on non-boundary stack PR with $child_count child PR(s)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip_skillset_ci=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run skillset ci
        id: skillset
        if: steps.stack.outputs.skip_skillset_ci != 'true'
        run: >-
          bun ./apps/skillset/src/cli.ts ci
          ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && '--fix' || '' }}
          --report "$RUNNER_TEMP/skillset-ci-report.md"
        continue-on-error: true
      - name: Add report to job summary
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/skillset-ci-report.md" ]; then
            cat "$RUNNER_TEMP/skillset-ci-report.md" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Push mechanical fixes
        if: steps.stack.outputs.skip_skillset_ci != 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(skillset): rebuild generated output"
          git push origin "HEAD:$HEAD_REF"
      - name: Comment report on PR
        if: steps.skillset.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GH_REPO" \
            --edit-last --create-if-none \
            --body-file "$RUNNER_TEMP/skillset-ci-report.md" \
          || gh pr comment "$PR_NUMBER" --repo "$GH_REPO" \
            --body-file "$RUNNER_TEMP/skillset-ci-report.md"
      - name: Fail when problems remain
        if: steps.skillset.outcome == 'failure'
        run: exit 1
